name: FMEA Agent

on:
  workflow_dispatch: {}

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FMEA agent
        env:
          API_KEY_DS: ${{ secrets.API_KEY_DS }}
          DS_MODEL: ${{ secrets.DS_MODEL }}
          API_KEY_LEVITY: ${{ secrets.API_KEY_LEVITY }}
        run: |
          python scripts/run_agent.py

      - name: Upload FMEA outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmea-outputs
          path: outputs/
          if-no-files-found: warn

      - name: Create Pull Request with outputs
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update FMEA outputs"
          title: "Automated FMEA outputs"
          body: "Generated by GitHub Actions using DeepSeek + Levity manual lookup."
          branch: "auto/fmea-outputs"
          add-paths: |
            outputs/*
